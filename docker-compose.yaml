services:
  db:
    image: postgres:14
    env_file: .env
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./entrypoint.d:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"

  web:
    image: node:20
    working_dir: /app
    volumes:
      - ./:/app
    command: npm start
    ports:
      - "3000:3000"
    depends_on:
      - db

volumes:
  postgres-data: {}